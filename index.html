<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cavernfall</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div class="touch-controls" id="touchControls" aria-hidden="true">
    <div class="touch-cluster touch-left">
      <div class="touch-dpad">
        <div class="touch-dpad-row touch-dpad-top">
          <button type="button" class="touch-btn touch-hold touch-jump" data-key="KeyW">^</button>
        </div>
        <div class="touch-dpad-row">
          <button type="button" class="touch-btn touch-hold" data-key="KeyA">&lt;</button>
          <button type="button" class="touch-btn touch-hold" data-key="KeyS">v</button>
          <button type="button" class="touch-btn touch-hold" data-key="KeyD">&gt;</button>
        </div>
      </div>
    </div>
    <div class="touch-cluster touch-right">
      <button type="button" class="touch-btn" data-action="eat">Еда</button>
      <button type="button" class="touch-btn" data-action="craft">Инв.</button>
      <button type="button" class="touch-btn" data-action="pause">Пауза</button>
    </div>
  </div>

  <script defer src="./src/core/bootstrap.js"></script>
  <script defer src="./src/core/audio.js"></script>
  <script defer src="./src/config/constants.js"></script>
  <script defer src="./src/world/blocks.js"></script>
  <script defer src="./src/items/items.js"></script>
  <script defer src="./src/utils/math.js"></script>
  <script defer src="./src/world/world.js"></script>
  <script defer src="./src/systems/inventory.js"></script>
  <script defer src="./src/core/state.js"></script>
  <script defer src="./src/core/save.js"></script>
  <script defer src="./src/systems/dayCycle.js"></script>
  <script defer src="./src/world/generation.js"></script>
  <script defer src="./src/systems/physics.js"></script>
  <script defer src="./src/systems/tools.js"></script>
  <script defer src="./src/crafting/recipes.js"></script>
  <script defer src="./src/systems/furnace.js"></script>
  <script defer src="./src/systems/crafting.js"></script>
  <script defer src="./src/entities/mobUtils.js"></script>
  <script defer src="./src/entities/player.js"></script>
  <script defer src="./src/entities/animals.js"></script>
  <script defer src="./src/entities/zombies.js"></script>
  <script defer src="./src/entities/spiders.js"></script>
  <script defer src="./src/entities/food.js"></script>
  <script defer src="./src/systems/survival.js"></script>
  <script defer src="./src/world/fluids.js"></script>
  <script defer src="./src/systems/interaction.js"></script>
  <script defer src="./src/core/camera.js"></script>
  <script defer src="./src/core/input.js"></script>
  <script defer src="./src/render/worldRenderer.js"></script>
  <script defer src="./src/render/itemRenderer.js"></script>
  <script defer src="./src/render/uiRenderer.js"></script>
  <script defer src="./src/render/craftingRenderer.js"></script>
  <script defer src="./src/render/pauseRenderer.js"></script>
  <script defer src="./src/render/renderer.js"></script>
  <script defer src="./src/main.js"></script>
</body>
</html>
