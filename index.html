<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cavernfall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <canvas id="game"></canvas>
  <div id="menuRoot" class="menu-root"></div>
  <div id="itemTooltip" class="item-tooltip is-hidden" aria-hidden="true"></div>

  <div class="touch-controls" id="touchControls" aria-hidden="true">
    <div class="touch-cluster touch-left">
      <div class="touch-stick" id="touchStick" aria-hidden="true">
        <div class="touch-stick-knob" id="touchStickKnob"></div>
      </div>
    </div>
    <div class="touch-cluster touch-right">
      <button type="button" class="touch-btn" data-action="eat">Еда</button>
      <button type="button" class="touch-btn" data-action="craft">Инв.</button>
      <button type="button" class="touch-btn" data-action="pause">Пауза</button>
    </div>
  </div>
