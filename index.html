  <canvas id="game"></canvas>
  <div class="help">
    <b>Cavernfall</b><br>
    A / D — идти, клавиши работают на любой раскладке<br>
    W / Пробел — прыгать / плыть вверх в воде<br>
    ЛКМ по блоку — ломать / ставить выбранный блок<br>
    ЛКМ по овце — ударить, выбить сырую баранину<br>
    1..9 — выбор ячейки хотбара<br>
    E — съесть 1 сырую баранину, тоже на любой раскладке
